<svg viewBox="0 0 800 540" xmlns="http://www.w3.org/2000/svg" width="800">
  <defs>
    <style>
      @keyframes float-a { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-3px); } }
      @keyframes float-b { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-2px); } }
      @keyframes float-d { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-2px); } }
      @keyframes float-e { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-3px); } }
      @keyframes float-f { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-2.5px); } }
      @keyframes dash-managed  { from { stroke-dashoffset: 200; } to { stroke-dashoffset: 0; } }
      @keyframes dash-satellite { from { stroke-dashoffset: 150; } to { stroke-dashoffset: 0; } }
      @keyframes orbit-glow    { 0%,100% { opacity: 0.18; } 50% { opacity: 0.32; } }
      @keyframes self-orbit {
        0%   { transform: translate(515px, 200px) scale(1.05); opacity: 1;   }
        12%  { transform: translate(492px, 164px) scale(0.95); opacity: 0.7; }
        25%  { transform: translate(400px, 148px) scale(0.82); opacity: 0;   }
        35%  { transform: translate(336px, 161px) scale(0.78); opacity: 0;   }
        50%  { transform: translate(285px, 200px) scale(0.80); opacity: 0;   }
        65%  { transform: translate(336px, 239px) scale(0.88); opacity: 0.4; }
        75%  { transform: translate(400px, 252px) scale(1.00); opacity: 0.9; }
        88%  { transform: translate(492px, 236px) scale(1.05); opacity: 1;   }
        100% { transform: translate(515px, 200px) scale(1.05); opacity: 1;   }
      }
      .node-core   { animation: float-a 3.2s ease-in-out infinite; }
      .node-tw     { animation: float-b 3.8s ease-in-out infinite 0.5s; }
      .node-unico  { animation: float-d 3.5s ease-in-out infinite 0.3s; }
      .node-port   { animation: float-e 4.4s ease-in-out infinite 0.7s; }
      .node-ge     { animation: float-f 3.9s ease-in-out infinite 1.3s; }
      .node-geapi  { animation: float-a 3.6s ease-in-out infinite 0.9s; }
      .node-rpi    { animation: float-b 4.2s ease-in-out infinite 0.2s; }
      .edge-managed  { animation: dash-managed  1.4s linear infinite; }
      .edge-sat-1    { animation: dash-satellite 3.0s linear infinite; }
      .edge-sat-2    { animation: dash-satellite 3.5s linear infinite 0.6s; }
      .edge-sat-3    { animation: dash-satellite 2.8s linear infinite 1.1s; }
      .edge-sat-4    { animation: dash-satellite 3.2s linear infinite 0.4s; }
      .edge-sat-5    { animation: dash-satellite 4.0s linear infinite 0.9s; }
      .orbit-ring    { animation: orbit-glow 4s ease-in-out infinite; }
      .node-self {
        animation: self-orbit 9s linear infinite;
        transform-box: fill-box;
        transform-origin: 0 0;
      }
    </style>
    <filter id="glow-core" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-managed" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-orbit" x="-40%" y="-80%" width="180%" height="260%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40,0 L0,0 L0,40" fill="none" stroke="#161b22" stroke-width="0.8"/>
    </pattern>
    <marker id="arr-blue" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,1 L0,6 L6,3.5 z" fill="#1f6feb" opacity="0.85"/>
    </marker>
    <marker id="arr-amber" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,1 L0,6 L6,3.5 z" fill="#e8a735" opacity="0.6"/>
    </marker>
  </defs>

  <!-- bg -->
  <rect width="800" height="540" fill="#0d1117"/>
  <rect width="800" height="540" fill="url(#grid)" opacity="0.3"/>

  <!-- header -->
  <text x="400" y="36" text-anchor="middle"
    font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="12" fill="#8b949e">
    // building systems that reduce the distance between idea and running code
  </text>

  <!-- gestio ↔ gestio-api connector -->
  <line x1="619" y1="238" x2="619" y2="282"
    stroke="#e8a735" stroke-width="1" opacity="0.3" stroke-dasharray="2 3"/>

  <!-- orbit ring -->
  <ellipse cx="400" cy="200" rx="115" ry="52"
    fill="none" stroke="#1f6feb" stroke-width="1" stroke-dasharray="3 5" class="orbit-ring"/>

  <!-- pulse rings on pi-agent -->
  <ellipse cx="400" cy="200" fill="none" stroke="#58a6ff" stroke-width="1">
    <animate attributeName="rx" values="82;115" dur="2.2s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="34;52"  dur="2.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.35;0" dur="2.2s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="400" cy="200" fill="none" stroke="#58a6ff" stroke-width="1">
    <animate attributeName="rx" values="82;115" dur="2.2s" begin="1.1s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="34;52"  dur="2.2s" begin="1.1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.35;0" dur="2.2s" begin="1.1s" repeatCount="indefinite"/>
  </ellipse>

  <!-- managed edge: pi-agent → twitter-agent -->
  <line x1="400" y1="230" x2="400" y2="384"
    stroke="#1f6feb" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.65"
    marker-end="url(#arr-blue)" class="edge-managed"/>

  <!-- managed packets -->
  <circle r="3" fill="#58a6ff">
    <animateMotion dur="1.4s" repeatCount="indefinite" path="M400,230 L400,384"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.88;1" dur="1.4s" repeatCount="indefinite"/>
  </circle>
  <circle r="3" fill="#58a6ff">
    <animateMotion dur="1.4s" begin="0.7s" repeatCount="indefinite" path="M400,230 L400,384"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.88;1" dur="1.4s" begin="0.7s" repeatCount="indefinite"/>
  </circle>

  <!-- satellite edges -->
  <line x1="355" y1="180" x2="258" y2="155" stroke="#e8a735" stroke-width="1" stroke-dasharray="4 5" opacity="0.55" marker-end="url(#arr-amber)" class="edge-sat-1"/>
  <line x1="450" y1="178" x2="542" y2="135" stroke="#e8a735" stroke-width="1" stroke-dasharray="4 5" opacity="0.55" marker-end="url(#arr-amber)" class="edge-sat-2"/>
  <line x1="462" y1="198" x2="542" y2="218" stroke="#e8a735" stroke-width="1" stroke-dasharray="4 5" opacity="0.55" marker-end="url(#arr-amber)" class="edge-sat-3"/>
  <line x1="458" y1="212" x2="542" y2="308" stroke="#e8a735" stroke-width="1" stroke-dasharray="4 5" opacity="0.55" marker-end="url(#arr-amber)" class="edge-sat-4"/>
  <line x1="338" y1="198" x2="238" y2="260" stroke="#e8a735" stroke-width="1" stroke-dasharray="4 5" opacity="0.55" marker-end="url(#arr-amber)" class="edge-sat-5"/>

  <!-- satellite packets -->
  <circle r="2" fill="#e8a735">
    <animateMotion dur="3s" repeatCount="indefinite" path="M355,180 L258,155"/>
    <animate attributeName="opacity" values="0;0.8;0.8;0" keyTimes="0;0.1;0.85;1" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle r="2" fill="#e8a735">
    <animateMotion dur="3.5s" begin="0.6s" repeatCount="indefinite" path="M450,178 L542,135"/>
    <animate attributeName="opacity" values="0;0.8;0.8;0" keyTimes="0;0.1;0.85;1" dur="3.5s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
  <circle r="2" fill="#e8a735">
    <animateMotion dur="2.8s" begin="1.1s" repeatCount="indefinite" path="M462,198 L542,218"/>
    <animate attributeName="opacity" values="0;0.8;0.8;0" keyTimes="0;0.1;0.85;1" dur="2.8s" begin="1.1s" repeatCount="indefinite"/>
  </circle>
  <circle r="2" fill="#e8a735">
    <animateMotion dur="3.2s" begin="0.4s" repeatCount="indefinite" path="M458,212 L542,308"/>
    <animate attributeName="opacity" values="0;0.8;0.8;0" keyTimes="0;0.1;0.85;1" dur="3.2s" begin="0.4s" repeatCount="indefinite"/>
  </circle>
  <circle r="2" fill="#e8a735">
    <animateMotion dur="4s" begin="0.9s" repeatCount="indefinite" path="M338,198 L238,260"/>
    <animate attributeName="opacity" values="0;0.8;0.8;0" keyTimes="0;0.1;0.85;1" dur="4s" begin="0.9s" repeatCount="indefinite"/>
  </circle>

  <!-- ── NODES ── -->

  <!-- pi-agent (core) -->
  <g class="node-core" filter="url(#glow-core)">
    <rect x="320" y="168" width="160" height="60" rx="8" fill="#0d1117" stroke="#58a6ff" stroke-width="1.5"/>
    <text text-anchor="middle" x="400" y="189" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="14" fill="#58a6ff" font-weight="600">pi-agent</text>
    <text text-anchor="middle" x="400" y="206" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="10" fill="#8b949e">autonomous · self-managing</text>
    <text text-anchor="middle" x="400" y="220" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="9"  fill="#388bfd">raspberry pi 5</text>
  </g>

  <!-- ↺ self orbiting node -->
  <g class="node-self" filter="url(#glow-orbit)">
    <rect x="-38" y="-13" width="76" height="26" rx="5" fill="#0d1117" stroke="#1f6feb" stroke-width="1"/>
    <text text-anchor="middle" x="0" y="-1"  font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="10" fill="#58a6ff">↺ self</text>
    <text text-anchor="middle" x="0" y="10" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="8"  fill="#3d6ea8">improving</text>
  </g>

  <!-- twitter-agent (managed) -->
  <g class="node-tw" filter="url(#glow-managed)">
    <rect x="288" y="384" width="224" height="62" rx="7" fill="#0d1117" stroke="#1f6feb" stroke-width="1.5"/>
    <circle cx="303" cy="400" r="3.5" fill="#1f6feb"/>
    <text text-anchor="middle" x="400" y="403" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="13" fill="#e6edf3" font-weight="500">twitter-agent</text>
    <text text-anchor="middle" x="400" y="419" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="10" fill="#8b949e">voice corpus · autonomous posting</text>
    <text text-anchor="middle" x="400" y="437" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="9"  fill="#388bfd">X · Node.js · Playwright</text>
  </g>

  <!-- unico -->
  <g class="node-unico">
    <rect x="108" y="120" width="152" height="56" rx="6" fill="#161b22" stroke="#e8a735" stroke-width="1" opacity="0.75"/>
    <text text-anchor="middle" x="184" y="140" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="13" fill="#c9d1d9">unico</text>
    <text text-anchor="middle" x="184" y="156" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="10" fill="#8b949e">labour-time tracking</text>
    <text text-anchor="middle" x="184" y="169" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="9"  fill="#a07020">worker cooperative</text>
  </g>

  <!-- portaria -->
  <g class="node-port">
    <rect x="540" y="100" width="158" height="56" rx="6" fill="#161b22" stroke="#e8a735" stroke-width="1" opacity="0.75"/>
    <text text-anchor="middle" x="619" y="120" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="13" fill="#c9d1d9">portaria</text>
    <text text-anchor="middle" x="619" y="136" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="10" fill="#8b949e">event credentials</text>
    <text text-anchor="middle" x="619" y="149" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="9"  fill="#a07020">commercial · R$6k/yr</text>
  </g>

  <!-- gestio -->
  <g class="node-ge">
    <rect x="540" y="188" width="158" height="56" rx="6" fill="#161b22" stroke="#e8a735" stroke-width="1" opacity="0.75"/>
    <text text-anchor="middle" x="619" y="208" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="13" fill="#c9d1d9">gestio</text>
    <text text-anchor="middle" x="619" y="224" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="10" fill="#8b949e">property management</text>
    <text text-anchor="middle" x="619" y="237" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="9"  fill="#a07020">React · TypeScript</text>
  </g>

  <!-- gestio-api -->
  <g class="node-geapi">
    <rect x="540" y="282" width="158" height="56" rx="6" fill="#161b22" stroke="#e8a735" stroke-width="1" opacity="0.75"/>
    <text text-anchor="middle" x="619" y="302" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="13" fill="#c9d1d9">gestio-api</text>
    <text text-anchor="middle" x="619" y="318" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="10" fill="#8b949e">REST · Docker · Pi</text>
    <text text-anchor="middle" x="619" y="331" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="9"  fill="#a07020">Node.js · Postgres</text>
  </g>

  <!-- raspberrypi -->
  <g class="node-rpi">
    <rect x="60" y="240" width="178" height="56" rx="6" fill="#161b22" stroke="#e8a735" stroke-width="1" opacity="0.75"/>
    <text text-anchor="middle" x="149" y="260" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="13" fill="#c9d1d9">raspberrypi</text>
    <text text-anchor="middle" x="149" y="276" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="10" fill="#8b949e">home automation hub</text>
    <text text-anchor="middle" x="149" y="289" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="9"  fill="#a07020">Pi-hole · HA · Tailscale</text>
  </g>

</svg>
