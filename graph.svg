<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" width="800">
  <defs>
    <style>
      @keyframes fl-a { 0%,100%{transform:translateY(0)}   50%{transform:translateY(-3px)}   }
      @keyframes fl-b { 0%,100%{transform:translateY(0)}   50%{transform:translateY(-2px)}   }
      @keyframes fl-c { 0%,100%{transform:translateY(0)}   50%{transform:translateY(-4px)}   }
      @keyframes fl-d { 0%,100%{transform:translateY(0)}   50%{transform:translateY(-2.5px)} }
      @keyframes orb  { 0%,100%{opacity:.10}  50%{opacity:.22} }
      .n-pia  { animation: fl-c 3.2s ease-in-out infinite; }
      .n-tw   { animation: fl-a 3.8s ease-in-out infinite .5s; }
      .n-ge   { animation: fl-b 4.1s ease-in-out infinite .3s; }
      .n-por  { animation: fl-a 3.5s ease-in-out infinite .8s; }
      .n-cof  { animation: fl-d 4.4s ease-in-out infinite .2s; }
      .n-rad  { animation: fl-b 3.9s ease-in-out infinite 1.1s; }
      .orb-r  { animation: orb  4s   ease-in-out infinite; }
    </style>

    <filter id="gc" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gs" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="800" height="460" fill="#0d1117"/>

  <!-- stars -->
  <circle cx="46"  cy="28"  r=".8" fill="#c9935a" opacity=".18"/>
  <circle cx="124" cy="65"  r=".5" fill="#c9935a" opacity=".13"/>
  <circle cx="684" cy="42"  r=".9" fill="#c9935a" opacity=".20"/>
  <circle cx="750" cy="80"  r=".4" fill="#c9935a" opacity=".11"/>
  <circle cx="38"  cy="132" r=".7" fill="#c9935a" opacity=".16"/>
  <circle cx="715" cy="165" r=".6" fill="#c9935a" opacity=".14"/>
  <circle cx="760" cy="318" r=".8" fill="#c9935a" opacity=".22"/>
  <circle cx="56"  cy="370" r=".5" fill="#c9935a" opacity=".13"/>
  <circle cx="28"  cy="422" r=".9" fill="#c9935a" opacity=".18"/>
  <circle cx="748" cy="425" r=".6" fill="#c9935a" opacity=".15"/>
  <circle cx="654" cy="90"  r=".5" fill="#c9935a" opacity=".12"/>
  <circle cx="80"  cy="185" r=".4" fill="#c9935a" opacity=".11"/>
  <circle cx="736" cy="252"  r=".7" fill="#c9935a" opacity=".16"/>
  <circle cx="492" cy="30"  r=".6" fill="#c9935a" opacity=".14"/>
  <circle cx="310" cy="36"  r=".8" fill="#c9935a" opacity=".20"/>
  <circle cx="520" cy="422" r=".5" fill="#c9935a" opacity=".13"/>
  <circle cx="250" cy="448" r=".7" fill="#c9935a" opacity=".18"/>
  <circle cx="638" cy="448" r=".4" fill="#c9935a" opacity=".11"/>
  <circle cx="86"  cy="325" r=".6" fill="#c9935a" opacity=".15"/>
  <circle cx="714" cy="130" r=".5" fill="#c9935a" opacity=".13"/>
  <circle cx="38"  cy="280" r=".8" fill="#c9935a" opacity=".19"/>
  <circle cx="422" cy="448" r=".6" fill="#c9935a" opacity=".14"/>
  <circle cx="162" cy="422" r=".5" fill="#c9935a" opacity=".12"/>
  <circle cx="580" cy="22"  r=".7" fill="#c9935a" opacity=".16"/>
  <circle cx="680" cy="392" r=".5" fill="#c9935a" opacity=".13"/>

  <!-- orbit rings -->
  <ellipse cx="400" cy="228" rx="148" ry="81"
    fill="none" stroke="#c9935a" stroke-width=".5" stroke-dasharray="2 6" class="orb-r"/>
  <ellipse cx="400" cy="228" rx="232" ry="128"
    fill="none" stroke="#c9935a" stroke-width=".5" stroke-dasharray="2 6" class="orb-r">
    <animate attributeName="opacity" values=".08;.18;.08" dur="5.5s" repeatCount="indefinite" begin="2s"/>
  </ellipse>

  <!-- pulse rings from center -->
  <ellipse cx="400" cy="228" fill="none" stroke="#c9935a" stroke-width=".9">
    <animate attributeName="rx" values="72;150"  dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="30;63"   dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values=".28;0" dur="2.8s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="400" cy="228" fill="none" stroke="#c9935a" stroke-width=".9">
    <animate attributeName="rx" values="72;150"  dur="2.8s" begin="1.4s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="30;63"   dur="2.8s" begin="1.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values=".28;0" dur="2.8s" begin="1.4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- ── EDGES ─────────────────────────────────── -->

  <!-- center → pi-agent -->
  <line x1="400" y1="219" x2="400" y2="103"
    stroke="#5b8dd9" stroke-width=".8" stroke-dasharray="3 5" opacity=".45"/>
  <!-- pi-agent → twitter-agent -->
  <line x1="407" y1="95"  x2="607" y2="141"
    stroke="#5b8dd9" stroke-width=".8" stroke-dasharray="3 5" opacity=".45"/>
  <!-- center → cofrinho -->
  <line x1="391" y1="221" x2="204" y2="150"
    stroke="#c9935a" stroke-width=".7" stroke-dasharray="2 5" opacity=".35"/>
  <!-- center → radinho -->
  <line x1="390" y1="234" x2="176" y2="280"
    stroke="#c9935a" stroke-width=".7" stroke-dasharray="2 5" opacity=".35"/>
  <!-- center → gestio -->
  <line x1="409" y1="236" x2="593" y2="341"
    stroke="#c9935a" stroke-width=".7" stroke-dasharray="2 5" opacity=".35"/>
  <!-- center → portaria -->
  <line x1="394" y1="238" x2="319" y2="363"
    stroke="#c9935a" stroke-width=".7" stroke-dasharray="2 5" opacity=".35"/>

  <!-- ── PARTICLES ──────────────────────────────── -->

  <!-- center → pi-agent -->
  <circle r="2" fill="#5b8dd9">
    <animateMotion dur="1.7s" repeatCount="indefinite" path="M400,219 L400,103"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;.05;.9;1" dur="1.7s" repeatCount="indefinite"/>
  </circle>
  <circle r="2" fill="#5b8dd9">
    <animateMotion dur="1.7s" begin=".85s" repeatCount="indefinite" path="M400,219 L400,103"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;.05;.9;1" dur="1.7s" begin=".85s" repeatCount="indefinite"/>
  </circle>

  <!-- pi-agent → twitter-agent -->
  <circle r="1.8" fill="#e8a020">
    <animateMotion dur="2.1s" repeatCount="indefinite" path="M400,95 L613,142"/>
    <animate attributeName="opacity" values="0;.9;.9;0" keyTimes="0;.05;.9;1" dur="2.1s" repeatCount="indefinite"/>
  </circle>
  <circle r="1.8" fill="#e8a020">
    <animateMotion dur="2.1s" begin="1.05s" repeatCount="indefinite" path="M400,95 L613,142"/>
    <animate attributeName="opacity" values="0;.9;.9;0" keyTimes="0;.05;.9;1" dur="2.1s" begin="1.05s" repeatCount="indefinite"/>
  </circle>

  <!-- center → cofrinho -->
  <circle r="1.8" fill="#5a8c9a">
    <animateMotion dur="2.9s" begin=".4s" repeatCount="indefinite" path="M400,228 L196,148"/>
    <animate attributeName="opacity" values="0;.75;.75;0" keyTimes="0;.08;.88;1" dur="2.9s" begin=".4s" repeatCount="indefinite"/>
  </circle>

  <!-- center → radinho -->
  <circle r="1.8" fill="#b06848">
    <animateMotion dur="3.3s" begin="1.2s" repeatCount="indefinite" path="M400,228 L168,278"/>
    <animate attributeName="opacity" values="0;.75;.75;0" keyTimes="0;.08;.88;1" dur="3.3s" begin="1.2s" repeatCount="indefinite"/>
  </circle>

  <!-- center → gestio -->
  <circle r="1.8" fill="#7a9c5a">
    <animateMotion dur="2.7s" begin=".7s" repeatCount="indefinite" path="M400,228 L598,344"/>
    <animate attributeName="opacity" values="0;.75;.75;0" keyTimes="0;.08;.88;1" dur="2.7s" begin=".7s" repeatCount="indefinite"/>
  </circle>

  <!-- center → portaria -->
  <circle r="1.8" fill="#c4522a">
    <animateMotion dur="3.1s" begin=".2s" repeatCount="indefinite" path="M400,228 L315,368"/>
    <animate attributeName="opacity" values="0;.75;.75;0" keyTimes="0;.08;.88;1" dur="3.1s" begin=".2s" repeatCount="indefinite"/>
  </circle>

  <!-- ── NODES ─────────────────────────────────── -->

  <!-- center: ygor-amorim (400, 228) — no float, anchor -->
  <g filter="url(#gc)">
    <circle cx="400" cy="228" r="26" fill="#c9935a" opacity=".09"/>
    <circle cx="400" cy="228" r="10" fill="#c9935a"/>
  </g>
  <text x="400" y="254" text-anchor="middle"
    font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="11" font-weight="600" fill="#c9935a"
  >ygor-amorim</text>
  <text x="400" y="267" text-anchor="middle"
    font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="8.5" fill="#6e7681"
  >builder · lisboa</text>

  <!-- pi-agent (400, 95) -->
  <g class="n-pia">
    <g filter="url(#gs)">
      <circle cx="400" cy="95" r="19" fill="#5b8dd9" opacity=".11"/>
      <circle cx="400" cy="95" r="7"  fill="#5b8dd9"/>
    </g>
    <text x="400" y="117" text-anchor="middle"
      font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="10.5" fill="#5b8dd9"
    >pi-agent</text>
    <text x="400" y="129" text-anchor="middle"
      font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="8" fill="#6e7681"
    >autonomous · raspberry pi</text>
  </g>

  <!-- twitter-agent (613, 142) -->
  <g class="n-tw">
    <g filter="url(#gs)">
      <circle cx="613" cy="142" r="16" fill="#e8a020" opacity=".11"/>
      <circle cx="613" cy="142" r="6"  fill="#e8a020"/>
    </g>
    <text x="633" y="146" text-anchor="start"
      font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="10.5" fill="#e8a020"
    >twitter-agent</text>
    <text x="633" y="158" text-anchor="start"
      font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="8" fill="#6e7681"
    >voice corpus · auto-posts</text>
  </g>

  <!-- gestio (598, 344) -->
  <g class="n-ge">
    <g filter="url(#gs)">
      <circle cx="598" cy="344" r="15" fill="#7a9c5a" opacity=".11"/>
      <circle cx="598" cy="344" r="5.5" fill="#7a9c5a"/>
    </g>
    <text x="617" y="348" text-anchor="start"
      font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="10.5" fill="#7a9c5a"
    >gestio</text>
    <text x="617" y="360" text-anchor="start"
      font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="8" fill="#6e7681"
    >property · react · ts</text>
  </g>

  <!-- portaria (315, 368) -->
  <g class="n-por">
    <g filter="url(#gs)">
      <circle cx="315" cy="368" r="15" fill="#c4522a" opacity=".11"/>
      <circle cx="315" cy="368" r="5.5" fill="#c4522a"/>
    </g>
    <text x="315" y="390" text-anchor="middle"
      font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="10.5" fill="#c4522a"
    >portaria</text>
    <text x="315" y="402" text-anchor="middle"
      font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="8" fill="#6e7681"
    >event credentials</text>
  </g>

  <!-- cofrinho (196, 148) -->
  <g class="n-cof">
    <g filter="url(#gs)">
      <circle cx="196" cy="148" r="14" fill="#5a8c9a" opacity=".11"/>
      <circle cx="196" cy="148" r="5.5" fill="#5a8c9a"/>
    </g>
    <text x="177" y="152" text-anchor="end"
      font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="10.5" fill="#5a8c9a"
    >cofrinho-api</text>
    <text x="177" y="164" text-anchor="end"
      font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="8" fill="#6e7681"
    >finance · node.js</text>
  </g>

  <!-- radinho (168, 278) -->
  <g class="n-rad">
    <g filter="url(#gs)">
      <circle cx="168" cy="278" r="14" fill="#b06848" opacity=".11"/>
      <circle cx="168" cy="278" r="5.5" fill="#b06848"/>
    </g>
    <text x="150" y="282" text-anchor="end"
      font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="10.5" fill="#b06848"
    >radinho</text>
    <text x="150" y="294" text-anchor="end"
      font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="8" fill="#6e7681"
    >newsletter · substack</text>
  </g>

</svg>
